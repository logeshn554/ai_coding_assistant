name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "./parallel_agent_system[test]"
        pip install -r backend/requirements.txt
        pip install "fakeredis[aioredis]>=2.0.0"

    - name: Run Python tests with coverage
      run: |
        python -m pytest --cov=parallel_agent_system --cov-report=xml --cov-report=term-missing --cov-fail-under=70 parallel_agent_system/tests/ backend/tests/

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: python-coverage-report
        path: coverage.xml

  frontend-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Node dependencies
      run: |
        cd frontend
        npm ci

    - name: Build Frontend React Application
      run: |
        cd frontend
        npm run build
