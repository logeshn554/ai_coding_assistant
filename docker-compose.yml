services:
  devpilot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devpilot
    ports:
      - "8000:8000"
    environment:
      - DOCKER_MODE=true
      - ALLOW_REMOTE=true
      - HOST=0.0.0.0
      - PORT=8000
      - INITIAL_WORKSPACE_ROOT=
      # Override config/profile key-value settings if needed
      # - CORS_ORIGINS=http://localhost:8000
    volumes:
      # Persists configurations and API keys (e.g. Anthropic, OpenAI, etc.)
      - devpilot-config:/root/.devpilot
      # Mount Windows drives so the folder browser can see your laptop's disk
      - C:/:/host/c
      - D:/:/host/d
      - E:/:/host/e
    restart: unless-stopped

volumes:
  devpilot-config:
